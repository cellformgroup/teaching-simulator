/* Pixel sprite: tiny 8x8 wrench, encoded as box-shadows */
const PIXEL_WRENCH = Array.from({length: 8}, (_, r) =>
  Array.from({length: 8}, (_, c) => {
    const on = [
      [0,5],[0,6],
      [1,4],[1,5],[1,6],[1,7],
      [2,4],[2,5],
      [3,3],[3,4],
      [4,2],[4,3],
      [5,1],[5,2],
      [6,0],[6,1],[6,2],[6,3],
      [7,0],[7,1],[7,2],[7,3],
    ].some(([pr,pc]) => pr === r && pc === c);
    return on ? `${c*3}px ${r*3}px 0 0 currentColor` : null;
  }).filter(Boolean)
).flat().join(", ");

function PixelIcon({ style }) {
  return (
    <span style={{
      display: "inline-block",
      width: 24, height: 24,
      overflow: "hidden",
      position: "relative",
      ...style,
    }}>
      <span style={{
        position: "absolute",
        top: 0, left: 0,
        width: 3, height: 3,
        boxShadow: PIXEL_WRENCH,
        color: "currentColor",
      }} />
    </span>
  );
}

/* Small pixel cursor blink animation for active states */
function PixelCursor() {
  const [on, setOn] = useState(true);
  useEffect(() => {
    const i = setInterval(() => setOn(v => !v), 530);
    return () => clearInterval(i);
  }, []);
  return (
    <span style={{
      display: "inline-block",
      width: 8, height: 14,
      background: on ? "#0066FF" : "transparent",
      marginLeft: 4,
      verticalAlign: "text-bottom",
      transition: "background 0.05s",
    }} />
  );
}

/* ═══ PIXEL SCENES — composed from scenario facts, not hand-drawn per scenario.
   A scenario declares a `scene`: caption + a list of sprite placements.
   Sprites come from the shared library below; adding a scenario never
   requires new artwork. Color carries meaning: red = the kid in focus,
   yellow = heat/sun, ink and gray = everyone else. ═══ */

const SCENE_PALETTE = {
  k: "#1a1a1a", m: "#888888", f: "#CCCCCC",
  r: "#FF3333", y: "#FFCC00", b: "#0066FF",
};

const SCENE_SPRITES = {
  sun: [
    "..y..",
    ".yyy.",
    "yyyyy",
    ".yyy.",
    "..y..",
  ],
  tableSlump: [   /* two kids, heads down on a table */
    "...kkk.......kkk....",
    "...kkk.......kkk....",
    "mmmmmmmmmmmmmmmmmmmm",
    "mmmmmmmmmmmmmmmmmmmm",
    ".mm..............mm.",
    ".mm..............mm.",
    ".mm..............mm.",
  ],
  runner: [       /* mid-chase */
    ".kkk...",
    ".kkk...",
    "..mm...",
    ".mmmm..",
    "m.mm.m.",
    "..mm...",
    ".m..m..",
    "m....m.",
  ],
  sadKid: [       /* apart from the group, holding the broken piece (red) */
    ".kkk....",
    ".kkk....",
    ".mmm.rr.",
    ".mmm.rr.",
    ".mmm....",
    ".m.m....",
    ".m.m....",
    ".m.m....",
  ],
  crane: [        /* the half-built crane, one piece missing */
    "....m....",
    "....m....",
    "....mmmm.",
    "....m..m.",
    "mmmmm....",
    "m...m....",
    "mmmmm....",
  ],
};

function PixelArt({ rows, size = 4, style }) {
  const shadows = [];
  rows.forEach((row, r) => [...row].forEach((ch, c) => {
    const col = SCENE_PALETTE[ch];
    if (col) shadows.push(`${c * size}px ${r * size}px 0 0 ${col}`);
  }));
  return (
    <span style={{ position: "absolute", width: rows[0].length * size, height: rows.length * size, ...style }}>
      <span style={{ position: "absolute", top: 0, left: 0, width: size, height: size, boxShadow: shadows.join(", ") }} />
    </span>
  );
}

function Scene({ scene }) {
  return (
    <div style={{
      position: "relative", height: 128, background: scene.bg || "#FAFAFA",
      border: "1px solid #EEE", borderRadius: 4, marginBottom: 24, overflow: "hidden",
    }}>
      <span className="mono" style={{
        position: "absolute", top: 10, left: 12, fontSize: 10,
        letterSpacing: "0.15em", textTransform: "uppercase", color: "#999",
      }}>{scene.caption}</span>
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 8, borderBottom: `2px solid ${scene.floor || "#E0E0E0"}` }} />
      {scene.items.map((it, i) => (
        <PixelArt key={i} rows={SCENE_SPRITES[it.s]} size={it.size || 4}
          style={{ left: it.x, right: it.right, bottom: it.top == null ? (it.bottom ?? 10) : undefined, top: it.top }} />
      ))}
    </div>
  );
}

    setHistory(h => [...h, opt.label]);
    setStepId(opt.next);

          text-align: left;

          border: 2px solid #E0E0E0;

          color: #1a1a1a;

          font-size: 14px;
          line-height: 1.5;
          cursor: pointer;
          transition: border-color 0.1s, background 0.1s;
        }
        .option-btn:hover { background: #1a1a1a; color: #FFFFFF; border-color: #1a1a1a; }
        .option-btn:hover .mono { color: #FFCC00; }

          font-family: 'Courier New', Courier, monospace;
          font-size: 13px;

          background: none;
          border: none;
          padding: 0;
          text-decoration: none;
        }
        .nav-link:hover { color: #0066FF; }

        .list-item {
          padding: 16px 0;
          border-bottom: 1px solid #F0F0F0;
          cursor: pointer;
          transition: padding-left 0.15s;
        }
        .list-item:hover { padding-left: 8px; }
        .list-item.disabled { opacity: 0.3; cursor: default; }
        .list-item.disabled:hover { padding-left: 0; }

        .scenario-item {

          border-bottom: 1px solid #F0F0F0;

          transition: padding-left 0.15s;
        }
        .scenario-item:hover { padding-left: 8px; }

        .ctx-chip {
          font-family: 'Courier New', Courier, monospace;
          font-size: 11px;
          letter-spacing: 0.05em;
          padding: 4px 10px;
          border: 1px solid #D0D0D0;
          border-radius: 2px;
          color: #555;
          background: #FFFFFF;
          cursor: pointer;
        }

        .ctx-chip.empty { color: #BBB; border-color: #EEE; }
        .ctx-chip.empty:hover { background: #1a1a1a; color: #FFFFFF; border-color: #1a1a1a; }

            )}

            {/* End state */}
            {!step.prompt && step.options.length === 0 && (
              <div style={{ paddingTop: 24, borderTop: "1px solid #EEE", marginTop: 12 }}>
                <p className="mono" style={{ fontSize: 12, color: "#999", marginBottom: 20 }}>
                  Scenario complete — {history.length + 1} decisions
                </p>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button className="option-btn" style={{ width: "auto" }} onClick={retry}>
                    Try different choices
                  </button>
                  <button className="option-btn" style={{ width: "auto" }} onClick={backToModule}>
                    Back to scenarios
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* FOOTER */}
        <footer style={{ marginTop: 80, paddingTop: 20, borderTop: "1px solid #F0F0F0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span className="mono" style={{ fontSize: 11, color: "#CCC" }}>Cellform — Teacher Training</span>
            <div style={{ display: "flex", gap: 4 }}>
              {["#FF3333","#0066FF","#FFCC00","#FF3333","#0066FF"].map((c,i) => (
                <span key={i} style={{ display: "inline-block", width: 6, height: 6, background: c }} />
              ))}
            </div>
          </div>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
