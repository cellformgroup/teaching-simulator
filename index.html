/* Pixel sprite: tiny 8x8 wrench, encoded as box-shadows */
const PIXEL_WRENCH = Array.from({length: 8}, (_, r) =>
  Array.from({length: 8}, (_, c) => {
    const on = [
      [0,5],[0,6],
      [1,4],[1,5],[1,6],[1,7],
      [2,4],[2,5],
      [3,3],[3,4],
      [4,2],[4,3],
      [5,1],[5,2],
      [6,0],[6,1],[6,2],[6,3],
      [7,0],[7,1],[7,2],[7,3],
    ].some(([pr,pc]) => pr === r && pc === c);
    return on ? `${c*3}px ${r*3}px 0 0 currentColor` : null;
  }).filter(Boolean)
).flat().join(", ");

function PixelIcon({ style }) {
  return (
    <span style={{
      display: "inline-block",
      width: 24, height: 24,
      overflow: "hidden",
      position: "relative",
      ...style,
    }}>
      <span style={{
        position: "absolute",
        top: 0, left: 0,
        width: 3, height: 3,
        boxShadow: PIXEL_WRENCH,
        color: "currentColor",
      }} />
    </span>
  );
}

/* Small pixel cursor blink animation for active states */
function PixelCursor() {
  const [on, setOn] = useState(true);
  useEffect(() => {
    const i = setInterval(() => setOn(v => !v), 530);
    return () => clearInterval(i);
  }, []);
  return (
    <span style={{
      display: "inline-block",
      width: 8, height: 14,
      background: on ? "#0066FF" : "transparent",
      marginLeft: 4,
      verticalAlign: "text-bottom",
      transition: "background 0.05s",
    }} />
  );
}

/* ═══ PIXEL SCENES — composed from scenario facts, not hand-drawn per scenario.
   A scenario declares a `scene`: caption + a list of sprite placements.
   Sprites come from the shared library below; adding a scenario never

   yellow = heat/sun, ink and gray = everyone else. ═══ */

const SCENE_PALETTE = {

  r: "#FF3333", y: "#FFCC00", b: "#0066FF",

const SCENE_SPRITES = {

    "..mmm...",

function PixelArt({ rows, size = 4, style, tint }) {
  const shadows = [];
  rows.forEach((row, r) => [...row].forEach((ch, c) => {
    const col = (tint && ch === "k") ? tint : SCENE_PALETTE[ch];
    if (col) shadows.push(`${c * size}px ${r * size}px 0 0 ${col}`);
  }));
  return (
    <span style={{ position: "absolute", width: rows[0].length * size, height: rows.length * size, ...style }}>
      <span style={{ position: "absolute", top: 0, left: 0, width: size, height: size, boxShadow: shadows.join(", ") }} />
    </span>
  );
}

function Scene({ scene }) {
  return (
    <div style={{
      position: "relative", height: 128, background: scene.bg || "#FAFAFA",
      border: "1px solid #EEE", borderRadius: 4, marginBottom: 24, overflow: "hidden",
    }}>
      <span className="mono" style={{
        position: "absolute", top: 10, left: 12, fontSize: 10,
        letterSpacing: "0.15em", textTransform: "uppercase", color: "#999",
      }}>{scene.caption}</span>
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 8, borderBottom: `2px solid ${scene.floor || "#E0E0E0"}` }} />
      {scene.items.map((it, i) => (
        <PixelArt key={i} rows={SCENE_SPRITES[it.s]} size={it.size || 4} tint={it.tint}
          style={{ left: it.x, right: it.right, bottom: it.top == null ? (it.bottom ?? 10) : undefined, top: it.top, opacity: it.opacity }} />
      ))}
    </div>
  );
}

                </div>

                {step.lesson && (
                  <div style={{ padding: "0 0 0 28px" }}>
                    <div className="mono" style={{ fontSize: 10, letterSpacing: "0.15em", textTransform: "uppercase", color: "#0066FF", marginBottom: 8 }}>
                      The principle
                    </div>
                    <p style={{ fontSize: 14, lineHeight: 1.7, color: "#555", whiteSpace: "pre-line" }}>{step.lesson}</p>
                  </div>
                )}
              </div>
            )}

            {/* Options */}
            {step.prompt && (
              <div style={{ marginBottom: 20 }}>
                <p style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>{step.prompt}</p>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {step.options.map((opt, i) => (
                    <button key={i} className="option-btn" onClick={() => choose(opt)}>
                      <span className="mono" style={{ color: "#0066FF", marginRight: 10, fontSize: 12 }}>
                        {String.fromCharCode(65 + i)}
                      </span>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* End state */}
            {!step.prompt && step.options.length === 0 && (
              <div style={{ paddingTop: 24, borderTop: "1px solid #EEE", marginTop: 12 }}>
                <p className="mono" style={{ fontSize: 12, color: "#999", marginBottom: 20 }}>
                  Scenario complete, {history.length + 1} decisions
                </p>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button className="option-btn" style={{ width: "auto" }} onClick={retry}>
                    Try different choices
                  </button>
                  <button className="option-btn" style={{ width: "auto" }} onClick={backToModule}>
                    Back to scenarios
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* FOOTER */}
        <footer style={{ marginTop: 80, paddingTop: 20, borderTop: "1px solid #F0F0F0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span className="mono" style={{ fontSize: 11, color: "#CCC" }}>Cellform, Teacher Training</span>
            <div style={{ display: "flex", gap: 4 }}>
              {["#FF3333","#0066FF","#FFCC00","#FF3333","#0066FF"].map((c,i) => (
                <span key={i} style={{ display: "inline-block", width: 6, height: 6, background: c }} />
              ))}
            </div>
          </div>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
